name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Validate AgentGlow
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Contract check
        run: npm run check

      - name: Unit and fixture tests
        run: npm test

      - name: Build smoke
        run: npm run build

      - name: Repository validation
        run: bash scripts/validate.sh

      - name: CLI fixture smoke artifact
        run: node bin/agentglow-render.mjs --fixture tests/fixtures/presence-run.json --out /tmp/agentglow-ci.svg
